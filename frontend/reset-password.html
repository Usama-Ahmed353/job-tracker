<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Job Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Sora', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] } } }
        }
    </script>
    <style>
        @keyframes softFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .float-slow { animation: softFloat 7s ease-in-out infinite; }
        @media (prefers-reduced-motion: reduce) { .float-slow { animation: none !important; } }
    </style>
</head>
<body class="font-sans text-white antialiased min-h-screen flex">

<!-- Left brand panel (hidden on small screens) -->
<div class="hidden lg:flex lg:w-1/2 bg-[#0B0F1A] relative overflow-hidden flex-col justify-between p-12">
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_60%_50%_at_20%_0%,rgba(79,70,229,0.25),transparent)]"></div>
    <div class="absolute inset-0 bg-[linear-gradient(to_right,rgba(255,255,255,0.04)_1px,transparent_1px),linear-gradient(to_bottom,rgba(255,255,255,0.04)_1px,transparent_1px)] bg-[size:3rem_3rem] [mask-image:radial-gradient(ellipse_70%_60%_at_20%_20%,#000_50%,transparent_100%)]"></div>

    <a href="index.html" class="relative z-10 flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-indigo-500 to-violet-500 flex items-center justify-center text-white font-display font-extrabold text-sm shadow-md shadow-indigo-500/20">JT</div>
        <span class="font-display font-bold text-xl tracking-tight text-white">Job Tracker</span>
    </a>

    <div class="relative z-10 max-w-md float-slow">
        <span class="text-xs font-mono font-medium text-indigo-300 tracking-widest uppercase">Account recovery</span>
        <h1 class="font-display text-4xl font-extrabold tracking-tight text-white leading-[1.15] mt-3 mb-4">
            Happens to the best pipelines.
        </h1>
        <p class="text-sm text-slate-400 leading-relaxed">We'll send a secure link to get you back into your board in seconds.</p>
    </div>

    <div class="relative z-10 flex items-center gap-6 text-[11px] font-mono text-slate-500">
        <span class="flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span> Secure reset link</span>
    </div>
</div>

<!-- Right form panel -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 bg-[#0B0F1A] border-l border-white/5">
    <div class="w-full max-w-sm">
        <div class="flex lg:hidden items-center gap-2.5 justify-center mb-10">
            <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white font-display font-extrabold text-xs shadow-sm">JT</div>
            <span class="font-display font-bold text-lg text-white">Job Tracker</span>
        </div>

        <h1 class="font-display text-2xl font-bold tracking-tight text-white mb-1.5">Reset Password</h1>
        <p class="text-sm text-slate-400 mb-8">Enter your email and we'll send you a password reset link.</p>
        <form id="forgotPasswordForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-1.5">Email Address</label>
                <input type="email" id="email" required class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl font-medium text-white focus:outline-none focus:border-indigo-500 focus:bg-white/10 transition-all text-sm">
            </div>
            <button type="submit" class="w-full py-3 bg-white hover:bg-slate-100 active:bg-slate-200 text-[#0B0F1A] rounded-xl text-sm font-semibold shadow-sm transition-all">Send Reset Link</button>
        </form>
        <p class="text-center text-sm text-slate-400 mt-6"><a href="login.html" class="font-semibold text-indigo-400 hover:text-indigo-300 underline">Back to Log In</a></p>
    </div>
</div>

</body>
</html>
